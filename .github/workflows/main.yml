name: .NET Core Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest  
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: |
          6.0.x
          8.0.x
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
    
    - name: Restore dependencies
      run: dotnet restore App.test/Test
    
    - name: Build
      run: dotnet build App.test/Test --no-restore --configuration Release
    
    - name: Test
      run: dotnet test App.test/Test --no-build --configuration Release --verbosity normal
    
    - name: Test Report
      if: always()
      run: |
        echo "## Тестирование завершено" >> $env:GITHUB_STEP_SUMMARY
        echo "Статус: ${{ job.status }}" >> $env:GITHUB_STEP_SUMMARY
        echo "Время: $(Get-Date)" >> $env:GITHUB_STEP_SUMMARY