name: .NET Core Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
    
    - name: Restore NuGet packages
      run: nuget restore App.test/Test/Test.csproj -PackagesDirectory App.test/Test/packages
    
    - name: Build
      run: msbuild App.test/Test/Test.csproj /p:Configuration=Release
    
    - name: Test
      run: dotnet test App.test/Test/Test.csproj --no-build --configuration Release --verbosity normal
    
    - name: Test Report
      if: always()
      run: |
        echo "## Тестирование завершено" >> $env:GITHUB_STEP_SUMMARY
        echo "Статус: ${{ job.status }}" >> $env:GITHUB_STEP_SUMMARY