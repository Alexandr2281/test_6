name: .NET Core Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Возможность ручного запуска

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0.x
    
    - name: Restore dependencies for test project
      run: dotnet restore App.test/Test
    
    - name: Build test project
      run: dotnet build App.test/Test --no-restore --configuration Release
    
    - name: Run tests
      run: dotnet test App.test/Test --no-build --configuration Release --verbosity normal
    
    - name: Test Report
      if: always()
      run: |
        echo "## Результаты тестирования" >> $GITHUB_STEP_SUMMARY
        echo "### Проект: App.test/Test" >> $GITHUB_STEP_SUMMARY
        echo "**Статус:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "**Время выполнения:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**Коммит:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        
        # Получаем информацию о тестах из результата
        if [[ "${{ job.status }}" == "success" ]]; then
          echo "✅ **Все тесты пройдены успешно**" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Обнаружены ошибки в тестах**" >> $GITHUB_STEP_SUMMARY
        fi